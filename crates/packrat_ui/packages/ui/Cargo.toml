[package]
name = "ui"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true }
api = { workspace = true, optional = true }

[features]
default = []
# Enables `Echo` (server-fn demo). Keep off for `web` so `api`'s `dioxus/fullstack` does not
# unify into the WASM client (hydration / atob without SSR).
demo_echo = ["dep:api"]
server = ["demo_echo", "api/server"]
