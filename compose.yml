services:
  postgres:
    image: postgres:14.22
    environment:
      POSTGRES_USER: packrat
      POSTGRES_PASSWORD: packrat
      POSTGRES_DB: packrat
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U packrat -d packrat"]
      interval: 2s
      timeout: 5s
      retries: 10

  packrat:
    build:
      context: .
      dockerfile: Dockerfile
    image: packrat:local
    environment:
      DATABASE_URL: postgres://packrat:packrat@postgres:5432/packrat?sslmode=disable
      # LISTEN_ADDR: "0.0.0.0:3000"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: packrat-web:local
    ports:
      - "8080:80"
    depends_on:
      - packrat
